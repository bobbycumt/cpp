<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵边缘元素之和演示</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            max-width: 790px;
            width: 100%;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .control-group {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 15px;
        }

        .control-group input[type=range] {
            margin: 0 10px;
            cursor: pointer;
        }

        .val-badge {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 20px;
            text-align: center;
            color: #e74c3c;
        }

        .grid-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            overflow-x: auto;
            padding: 10px;
        }

        .grid {
            display: grid;
            gap: 4px;
            background-color: #cfd8dc;
            padding: 6px;
            border-radius: 8px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #7f8c8d;
            border-radius: 4px;
            position: relative;
            transition: all 0.3s;
        }

        .coord {
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 10px;
            color: #bdc3c7;
            font-weight: normal;
        }

        /* 边缘元素高亮动画 */
        .edge-cell {
            background-color: #fff3e0;
            color: #d35400;
            box-shadow: inset 0 0 0 3px #f39c12;
            animation: pulse 2s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { box-shadow: inset 0 0 0 3px #f39c12, 0 0 0 0 rgba(243, 156, 18, 0.4); }
            50% { box-shadow: inset 0 0 0 3px #f39c12, 0 0 10px 2px rgba(243, 156, 18, 0.6); }
            100% { box-shadow: inset 0 0 0 3px #f39c12, 0 0 0 0 rgba(243, 156, 18, 0.4); }
        }

        .result-box {
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            padding: 15px 20px;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.8;
            color: #2c3e50;
        }

        .equation {
            font-family: monospace;
            font-size: 16px;
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 10px;
            word-wrap: break-word;
            border: 1px dashed #bdc3c7;
        }

        .highlight-sum {
            font-size: 22px;
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>矩阵边缘元素提取与求和</h2>
    
    <div class="controls">
        <div class="control-group">
            行数 (m): <input type="range" id="rowSlider" min="1" max="8" value="3">
            <span class="val-badge" id="rowVal">3</span>
        </div>
        <div class="control-group">
            列数 (n): <input type="range" id="colSlider" min="1" max="8" value="3">
            <span class="val-badge" id="colVal">3</span>
        </div>
        <button onclick="generateRandomData()" style="padding: 6px 12px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: white;">刷新随机数</button>
    </div>

    <div class="grid-wrapper">
        <div class="grid" id="gridContainer">
            </div>
    </div>

    <div class="result-box">
        <div><strong>单层遍历判断逻辑：</strong> 只要满足 <code>i == 0 || i == m-1 || j == 0 || j == n-1</code> 就是边缘元素。</div>
        <div class="equation" id="equationBox">
            </div>
    </div>
</div>

<script>
    // 初始样例数据
    const sampleData = [
        [3, 4, 1],
        [3, 7, 1],
        [2, 0, 1]
    ];

    let m = 3; // 行数
    let n = 3; // 列数
    let matrixData = [];

    // 获取 DOM 元素
    const rowSlider = document.getElementById('rowSlider');
    const colSlider = document.getElementById('colSlider');
    const rowVal = document.getElementById('rowVal');
    const colVal = document.getElementById('colVal');
    const gridContainer = document.getElementById('gridContainer');
    const equationBox = document.getElementById('equationBox');

    // 初始化数据
    function initData() {
        matrixData = [];
        for (let i = 0; i < m; i++) {
            let row = [];
            for (let j = 0; j < n; j++) {
                // 如果是 3x3 初始状态，使用样例数据，否则随机 0-9
                if (m === 3 && n === 3 && i < 3 && j < 3) {
                    row.push(sampleData[i][j]);
                } else {
                    row.push(Math.floor(Math.random() * 10));
                }
            }
            matrixData.push(row);
        }
    }

    // 手动刷新随机数据
    function generateRandomData() {
        for (let i = 0; i < m; i++) {
            for (let j = 0; j < n; j++) {
                matrixData[i][j] = Math.floor(Math.random() * 10);
            }
        }
        render();
    }

    // 渲染视图
    function render() {
        // 更新滑块数值显示
        rowVal.innerText = m;
        colVal.innerText = n;

        // 设置 CSS Grid
        gridContainer.style.gridTemplateColumns = `repeat(${n}, 50px)`;
        gridContainer.style.gridTemplateRows = `repeat(${m}, 50px)`;
        gridContainer.innerHTML = '';

        let sum = 0;
        let addends = [];

        // 双层循环遍历
        for (let i = 0; i < m; i++) {
            for (let j = 0; j < n; j++) {
                const val = matrixData[i][j];
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 添加坐标小字
                const coord = document.createElement('span');
                coord.className = 'coord';
                coord.innerText = `${i},${j}`;
                cell.appendChild(coord);

                // 添加数值
                const valText = document.createTextNode(val);
                cell.appendChild(valText);

                // 核心判断逻辑
                if (i === 0 || i === m - 1 || j === 0 || j === n - 1) {
                    cell.classList.add('edge-cell');
                    sum += val;
                    addends.push(val);
                }

                gridContainer.appendChild(cell);
            }
        }

        // 更新算式显示
        if (addends.length > 0) {
            let eqText = "边缘元素之和 = " + addends.join(" + ") + " = <span class='highlight-sum'>" + sum + "</span>";
            equationBox.innerHTML = eqText;
        } else {
            equationBox.innerHTML = "边缘元素之和 = <span class='highlight-sum'>0</span>";
        }
    }

    // 事件监听
    rowSlider.addEventListener('input', (e) => {
        m = parseInt(e.target.value);
        initData();
        render();
    });

    colSlider.addEventListener('input', (e) => {
        n = parseInt(e.target.value);
        initData();
        render();
    });

    // 页面加载完成后的首次渲染
    initData();
    render();
</script>

</body>
</html>
