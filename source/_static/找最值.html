<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算法竞赛 - 最值及位置查找动画</title>
  <style>
    :root {
      --page-width: 790px;
      --page-max-height: 1280px;
      --bg: #0f172a;
      --panel: #111827;
      --card: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0b1023, #131c3d 40%, #0f172a);
      color: var(--text);
      min-height: 100vh;
      max-height: var(--page-max-height);
      overflow-y: auto;
    }

    .container {
      width: min(var(--page-width), calc(100vw - 20px));
      margin: 22px auto 36px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(20px, 3vw, 30px);
      color: #f8fafc;
      letter-spacing: .5px;
    }

    .desc {
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: end;
    }

    label {
      font-size: 13px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 6px;
    }

    input, select, button, textarea {
      width: 100%;
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      font-size: 14px;
      padding: 10px;
    }

    textarea { min-height: 80px; resize: vertical; }

    button {
      cursor: pointer;
      background: linear-gradient(145deg, #1d4ed8, #2563eb);
      border: none;
      font-weight: 600;
      transition: transform .15s ease, filter .15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.08); }
    button:active { transform: translateY(0); }
    button.secondary { background: linear-gradient(145deg, #334155, #475569); }
    button.good { background: linear-gradient(145deg, #15803d, #16a34a); }

    .array-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .array {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      min-height: 250px;
      padding: 6px 4px;
    }

    .bar {
      min-width: 44px;
      text-align: center;
      position: relative;
      transition: transform .35s ease, filter .35s ease;
    }

    .bar:hover { transform: translateY(-4px); }

    .bar-rect {
      border-radius: 10px 10px 4px 4px;
      background: linear-gradient(180deg, #60a5fa, #2563eb);
      box-shadow: 0 8px 20px rgba(37,99,235,.35);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all .35s ease;
    }

    .bar.current .bar-rect {
      background: linear-gradient(180deg, #fde68a, #f59e0b);
      box-shadow: 0 0 0 2px rgba(245,158,11,.45), 0 12px 22px rgba(245,158,11,.35);
    }

    .bar.best .bar-rect {
      background: linear-gradient(180deg, #86efac, #22c55e);
      box-shadow: 0 0 0 2px rgba(34,197,94,.4), 0 12px 24px rgba(34,197,94,.35);
    }

    .bar.tie .bar-rect {
      background: linear-gradient(180deg, #fca5a5, #ef4444);
      box-shadow: 0 0 0 2px rgba(239,68,68,.35), 0 12px 24px rgba(239,68,68,.28);
    }

    .bar .value {
      margin-top: 6px;
      font-weight: 700;
      font-size: 13px;
    }

    .bar .index {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .status-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 6px;
    }

    @media (max-width: 820px) {
      .controls,
      .status-grid {
        grid-template-columns: 1fr;
      }
    }

    .status-card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.18);
      padding: 10px 12px;
    }

    .status-card h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 600;
    }

    .status-card .big {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .5px;
      color: #fff;
    }

    .status-card .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .log {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      background: #0a0f1e;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,.18);
      padding: 12px;
      max-height: 260px;
      overflow-y: auto;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: #cbd5e1;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: -1px;
    }

    .dot.normal { background: #3b82f6; }
    .dot.current { background: #f59e0b; }
    .dot.best { background: #22c55e; }
    .dot.tie { background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <h1>算法竞赛可视化：一趟扫描找最值与下标</h1>
      <div class="desc">
        输入数组后，动画展示 <b>O(n)</b> 扫描过程：逐个比较元素，实时维护当前最值与其位置。支持找最大值或最小值，并可切换“首次出现”或“末次出现”策略。
      </div>

      <div class="controls">
        <div>
          <label for="arrInput">数组（空格/逗号分隔）</label>
          <textarea id="arrInput">7 3 9 2 9 4 1 8</textarea>
        </div>
        <div>
          <label for="modeSelect">查找目标</label>
          <select id="modeSelect">
            <option value="max">最大值</option>
            <option value="min">最小值</option>
          </select>
        </div>
        <div>
          <label for="tieSelect">重复值位置策略</label>
          <select id="tieSelect">
            <option value="first">首次出现</option>
            <option value="last">末次出现</option>
          </select>
        </div>
        <div>
          <label for="speedRange">动画速度（毫秒/步）</label>
          <input id="speedRange" type="range" min="120" max="1200" step="40" value="420" />
        </div>
        <div>
          <button id="randomBtn" type="button" class="secondary">随机生成数组</button>
        </div>
        <div>
          <button id="startBtn" type="button" class="good">开始自动动画</button>
        </div>
        <div>
          <button id="stepInitBtn" type="button" class="secondary">进入单步模式</button>
        </div>
        <div>
          <button id="nextStepBtn" type="button" class="secondary">下一步</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="legend">
        <span><i class="dot normal"></i>普通元素</span>
        <span><i class="dot current"></i>当前扫描元素</span>
        <span><i class="dot best"></i>当前最优值位置</span>
        <span><i class="dot tie"></i>同值候选（仅末次策略时会更新）</span>
      </div>
      <div class="array-wrap">
        <div id="arrayView" class="array"></div>
      </div>
    </section>

    <section class="panel">
      <div class="status-grid">
        <div class="status-card">
          <h3>当前扫描下标 i</h3>
          <div class="big" id="curIndex">-</div>
          <div class="sub" id="curValue">值：-</div>
        </div>
        <div class="status-card">
          <h3>当前最优 best</h3>
          <div class="big" id="bestValue">-</div>
          <div class="sub" id="bestIndex">位置：-</div>
        </div>
        <div class="status-card">
          <h3>最终结果</h3>
          <div class="big" id="finalText">等待开始</div>
          <div class="sub">索引从 0 开始（竞赛常用）</div>
        </div>
      </div>

      <h3 style="margin: 14px 0 8px; font-size: 15px; color:#cbd5e1;">过程日志</h3>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script>
    const arrInput = document.getElementById('arrInput');
    const modeSelect = document.getElementById('modeSelect');
    const tieSelect = document.getElementById('tieSelect');
    const speedRange = document.getElementById('speedRange');
    const randomBtn = document.getElementById('randomBtn');
    const startBtn = document.getElementById('startBtn');
    const stepInitBtn = document.getElementById('stepInitBtn');
    const nextStepBtn = document.getElementById('nextStepBtn');

    const arrayView = document.getElementById('arrayView');
    const curIndexEl = document.getElementById('curIndex');
    const curValueEl = document.getElementById('curValue');
    const bestValueEl = document.getElementById('bestValue');
    const bestIndexEl = document.getElementById('bestIndex');
    const finalTextEl = document.getElementById('finalText');
    const logEl = document.getElementById('log');

    let running = false;
    let steps = [];
    let stepCursor = 0;
    let stepSessionActive = false;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function parseArray() {
      const tokens = arrInput.value.trim().split(/[\s,，]+/).filter(Boolean);
      const nums = tokens.map(Number);
      if (nums.length === 0 || nums.some(n => Number.isNaN(n))) {
        return null;
      }
      return nums;
    }

    function renderArray(arr, current = -1, best = -1, tie = -1) {
      arrayView.innerHTML = '';
      const maxAbs = Math.max(...arr.map(v => Math.abs(v)), 1);
      arr.forEach((value, idx) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (idx === current) bar.classList.add('current');
        if (idx === best) bar.classList.add('best');
        if (idx === tie && tie !== best) bar.classList.add('tie');

        const rect = document.createElement('div');
        rect.className = 'bar-rect';
        const height = 40 + Math.round(Math.abs(value) / maxAbs * 150);
        rect.style.height = `${height}px`;

        const valueText = document.createElement('div');
        valueText.className = 'value';
        valueText.textContent = value;

        const indexText = document.createElement('div');
        indexText.className = 'index';
        indexText.textContent = `idx=${idx}`;

        bar.append(rect, valueText, indexText);
        arrayView.appendChild(bar);
      });
    }

    function pushLog(text) {
      logEl.textContent += text + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(curIdx, curVal, bestIdx, bestVal) {
      curIndexEl.textContent = curIdx >= 0 ? curIdx : '-';
      curValueEl.textContent = `值：${curVal ?? '-'}`;
      bestValueEl.textContent = bestVal ?? '-';
      bestIndexEl.textContent = `位置：${bestIdx >= 0 ? bestIdx : '-'}`;
    }

    function compare(a, b, mode, tiePolicy) {
      if (mode === 'max') {
        if (a > b) return true;
        if (a === b && tiePolicy === 'last') return 'tie';
        return false;
      }
      if (a < b) return true;
      if (a === b && tiePolicy === 'last') return 'tie';
      return false;
    }

    function buildSteps(arr, mode, tie) {
      const list = [];
      let bestIdx = 0;
      let tieIdx = -1;
      const modeText = mode === 'max' ? '最大值' : '最小值';

      list.push({
        type: 'init',
        current: 0,
        best: bestIdx,
        tie: tieIdx,
        curValue: arr[0],
        bestValue: arr[bestIdx],
        log: `初始化: best = arr[0] = ${arr[0]}, bestIdx = 0`
      });

      for (let i = 1; i < arr.length; i++) {
        list.push({
          type: 'inspect',
          current: i,
          best: bestIdx,
          tie: tieIdx,
          curValue: arr[i],
          bestValue: arr[bestIdx],
          log: `比较 i=${i}: arr[i]=${arr[i]} 与 当前best=${arr[bestIdx]}`
        });

        const cmp = compare(arr[i], arr[bestIdx], mode, tie);
        if (cmp === true) {
          bestIdx = i;
          tieIdx = -1;
          list.push({
            type: 'update',
            current: i,
            best: bestIdx,
            tie: tieIdx,
            curValue: arr[i],
            bestValue: arr[bestIdx],
            log: `  -> 更新 best: best = ${arr[bestIdx]}, bestIdx = ${bestIdx}`
          });
        } else if (cmp === 'tie') {
          tieIdx = i;
          bestIdx = i;
          list.push({
            type: 'tie',
            current: i,
            best: bestIdx,
            tie: tieIdx,
            curValue: arr[i],
            bestValue: arr[bestIdx],
            log: `  -> 同值且选择末次出现: bestIdx 更新为 ${bestIdx}`
          });
        } else {
          list.push({
            type: 'keep',
            current: i,
            best: bestIdx,
            tie: tieIdx,
            curValue: arr[i],
            bestValue: arr[bestIdx],
            log: '  -> 不更新'
          });
        }
      }

      list.push({
        type: 'done',
        current: -1,
        best: bestIdx,
        tie: -1,
        curValue: null,
        bestValue: arr[bestIdx],
        final: `${modeText} = ${arr[bestIdx]}，位置 = ${bestIdx}`,
        log: `结束: ${modeText}=${arr[bestIdx]}, index=${bestIdx}`
      });

      return list;
    }

    function applyStep(arr, step) {
      renderArray(arr, step.current, step.best, step.tie);
      setStatus(step.current, step.curValue, step.best, step.bestValue);
      if (step.final) {
        finalTextEl.textContent = step.final;
      }
      if (step.log) {
        pushLog(step.log);
      }
    }

    function prepareSession() {
      const arr = parseArray();
      if (!arr) {
        alert('请输入合法整数/实数数组，例如：5 1 9 3 9');
        return null;
      }

      const mode = modeSelect.value;
      const tie = tieSelect.value;
      steps = buildSteps(arr, mode, tie);
      stepCursor = 0;
      stepSessionActive = true;
      logEl.textContent = '';
      finalTextEl.textContent = '执行中...';
      return arr;
    }

    function setButtonsStateAuto(active) {
      startBtn.disabled = active;
      stepInitBtn.disabled = active;
      nextStepBtn.disabled = active;
      randomBtn.disabled = active;
    }

    function setButtonsStateManual(active) {
      startBtn.disabled = active;
      stepInitBtn.disabled = false;
      nextStepBtn.disabled = !active;
      randomBtn.disabled = false;
    }

    async function run() {
      if (running) return;
      const arr = prepareSession();
      if (!arr) return;

      running = true;
      setButtonsStateAuto(true);
      const speed = Number(speedRange.value);

      while (stepCursor < steps.length) {
        applyStep(arr, steps[stepCursor]);
        stepCursor++;
        await sleep(speed);
      }
      stepSessionActive = false;

      running = false;
      setButtonsStateAuto(false);
    }

    function initStepMode() {
      if (running) return;
      const arr = prepareSession();
      if (!arr) return;

      setButtonsStateManual(true);
      applyStep(arr, steps[stepCursor]);
      stepCursor++;
      nextStepBtn.onclick = () => {
        if (!stepSessionActive) return;
        if (stepCursor >= steps.length) {
          stepSessionActive = false;
          setButtonsStateManual(false);
          return;
        }
        applyStep(arr, steps[stepCursor]);
        stepCursor++;
        if (stepCursor >= steps.length) {
          stepSessionActive = false;
          setButtonsStateManual(false);
        }
      };
    }

    function genRandomArray(n = 10) {
      const arr = Array.from({ length: n }, () => Math.floor(Math.random() * 31) - 10);
      arrInput.value = arr.join(' ');
      renderArray(arr);
      setStatus(-1, null, -1, null);
      finalTextEl.textContent = '等待开始';
      logEl.textContent = '已随机生成新数组。\n';
      setButtonsStateManual(false);
    }

    randomBtn.addEventListener('click', () => {
      const n = 8 + Math.floor(Math.random() * 8);
      genRandomArray(n);
    });

    startBtn.addEventListener('click', run);
    stepInitBtn.addEventListener('click', initStepMode);

    renderArray(parseArray() || [0]);
    setStatus(-1, null, -1, null);
    setButtonsStateManual(false);
    logEl.textContent = '请点击“开始自动动画”或“进入单步模式”。\n';
  </script>
</body>
</html>
