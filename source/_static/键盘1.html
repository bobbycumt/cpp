<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查表匹配法 - 键盘打字模拟</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            max-width: 790px;
            width: 100%;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 { margin-top: 0; color: #2c3e50; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* 控制区 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        input[type="text"] { padding: 8px 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; width: 250px; text-transform: uppercase; font-family: monospace; }
        button { padding: 8px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* 字符串显示区 */
        .string-display { text-align: center; font-size: 24px; font-family: monospace; font-weight: bold; margin-bottom: 20px; letter-spacing: 5px; }
        .char-normal { color: #7f8c8d; }
        .char-active { color: #e74c3c; transform: scale(1.3); display: inline-block; transition: all 0.2s; }
        .char-done { color: #2c3e50; }

        /* 键盘区 */
        .keyboard { display: flex; flex-direction: column; gap: 5px; align-items: center; margin-bottom: 25px; background: #e9ecef; padding: 15px; border-radius: 8px; }
        .kb-row { display: flex; gap: 5px; }
        .kb-row:nth-child(2) { margin-left: 20px; }
        .kb-row:nth-child(3) { margin-left: 40px; }
        .kb-row:nth-child(4) { margin-left: 60px; }
        
        .key { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 4px; background: #fff; box-shadow: 0 2px 0 #bdc3c7; border: 1px solid #dcdde1; transition: all 0.1s; }
        .key.active { transform: translateY(2px); box-shadow: 0 0 0 #bdc3c7; filter: brightness(0.8); border: 2px solid #000; }

        /* 手指颜色映射 */
        .finger-0 { background-color: #ff9ff3; } /* 左小指 */
        .finger-1 { background-color: #feca57; } /* 左无名指 */
        .finger-2 { background-color: #ff6b6b; } /* 左中指 */
        .finger-3 { background-color: #1dd1a1; } /* 左食指 */
        .finger-4 { background-color: #48dbfb; } /* 右食指 */
        .finger-5 { background-color: #54a0ff; } /* 右中指 */
        .finger-6 { background-color: #5f27cd; color: white;} /* 右无名指 */
        .finger-7 { background-color: #c8d6e5; } /* 右小指 */

        /* 计数器区 */
        .counters { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .counter-box { flex: 1; display: flex; flex-direction: column; align-items: center; background: #f8f9fa; border-radius: 6px; padding: 10px 5px; border: 2px solid transparent; transition: all 0.2s;}
        .counter-box.active { transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.15); border-color: #2c3e50; }
        .finger-name { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; text-align: center;}
        .finger-val { font-size: 24px; font-weight: bold; background: white; width: 100%; text-align: center; border-radius: 4px; padding: 5px 0; }
        
        /* 查表展示区（代码逻辑模拟） */
        .log-box { background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 14px; min-height: 80px; }
        .log-code { color: #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <h2>方法一：查表匹配法演示</h2>
    
    <div class="controls">
        <input type="text" id="inputStr" value="AON=BOO;" maxlength="30" placeholder="输入只包含键盘的大写字符">
        <button id="btnPlay" onclick="startAnimation()">自动演示</button>
    </div>

    <div class="string-display" id="strDisplay"></div>

    <div class="keyboard" id="keyboard">
        <div class="kb-row" id="row1"></div>
        <div class="kb-row" id="row2"></div>
        <div class="kb-row" id="row3"></div>
        <div class="kb-row" id="row4"></div>
    </div>

    <div class="counters">
        <div class="counter-box finger-0" id="cnt-0"><div class="finger-name">0:左小指</div><div class="finger-val" id="val-0">0</div></div>
        <div class="counter-box finger-1" id="cnt-1"><div class="finger-name">1:左无名</div><div class="finger-val" id="val-1">0</div></div>
        <div class="counter-box finger-2" id="cnt-2"><div class="finger-name">2:左中指</div><div class="finger-val" id="val-2">0</div></div>
        <div class="counter-box finger-3" id="cnt-3"><div class="finger-name">3:左食指</div><div class="finger-val" id="val-3">0</div></div>
        <div class="counter-box finger-4" id="cnt-4"><div class="finger-name">4:右食指</div><div class="finger-val" id="val-4">0</div></div>
        <div class="counter-box finger-5" id="cnt-5"><div class="finger-name">5:右中指</div><div class="finger-val" id="val-5">0</div></div>
        <div class="counter-box finger-6" id="cnt-6"><div class="finger-name">6:右无名</div><div class="finger-val" id="val-6">0</div></div>
        <div class="counter-box finger-7" id="cnt-7"><div class="finger-name">7:右小指</div><div class="finger-val" id="val-7">0</div></div>
    </div>

    <div class="log-box" id="logBox">
        等待开始...<br>
        <span style="color:#7f8c8d;">提示：观察下方是如何在 8 个字符串桶中查找字符的。</span>
    </div>
</div>

<script>
    // 核心打表数据：8个字符串
    const keysTable = [
        "1QAZ",             // 0
        "2WSX",             // 1
        "3EDC",             // 2
        "45RTFGVB",         // 3
        "67YUHJNM",         // 4
        "8IK,",             // 5
        "9OL.",             // 6
        "0-=P[];'/"         // 7
    ];

    // 键盘按键布局
    const keyboardLayout = [
        ['1','2','3','4','5','6','7','8','9','0','-','='],
        ['Q','W','E','R','T','Y','U','I','O','P','[',']'],
        ['A','S','D','F','G','H','J','K','L',';','\''],
        ['Z','X','C','V','B','N','M',',','.','/']
    ];

    let counts = [0,0,0,0,0,0,0,0];
    let isPlaying = false;
    let timer = null;

    // 初始化键盘渲染
    function initKeyboard() {
        for (let r = 0; r < 4; r++) {
            const rowDiv = document.getElementById(`row${r+1}`);
            rowDiv.innerHTML = '';
            keyboardLayout[r].forEach(char => {
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                keyDiv.id = 'key-' + char;
                keyDiv.innerText = char;
                
                // 查找该键属于哪个手指，并赋予颜色类
                for (let i = 0; i < 8; i++) {
                    if (keysTable[i].includes(char)) {
                        keyDiv.classList.add(`finger-${i}`);
                        break;
                    }
                }
                rowDiv.appendChild(keyDiv);
            });
        }
    }

    // 根据输入渲染顶部字符串
    function renderString(str, activeIdx) {
        const display = document.getElementById('strDisplay');
        display.innerHTML = '';
        for (let i = 0; i < str.length; i++) {
            const span = document.createElement('span');
            span.innerText = str[i];
            if (i < activeIdx) span.className = 'char-done';
            else if (i === activeIdx) span.className = 'char-active';
            else span.className = 'char-normal';
            display.appendChild(span);
        }
    }

    // 重置状态
    function resetAll() {
        counts = [0,0,0,0,0,0,0,0];
        for(let i=0; i<8; i++) {
            document.getElementById(`val-${i}`).innerText = 0;
            document.getElementById(`cnt-${i}`).classList.remove('active');
        }
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
    }

    // 动画主逻辑
    function startAnimation() {
        if(isPlaying) return;
        
        const inputStr = document.getElementById('inputStr').value.toUpperCase();
        if(!inputStr) return;

        isPlaying = true;
        document.getElementById('btnPlay').disabled = true;
        document.getElementById('inputStr').disabled = true;
        
        resetAll();
        let currentIdx = 0;

        function step() {
            // 清理上一帧的高亮
            document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
            document.querySelectorAll('.counter-box').forEach(c => c.classList.remove('active'));

            if (currentIdx >= inputStr.length) {
                // 结束
                isPlaying = false;
                document.getElementById('btnPlay').disabled = false;
                document.getElementById('inputStr').disabled = false;
                document.getElementById('logBox').innerHTML = `<span style="color:#2ecc71;">✓ 字符串遍历完毕！</span><br>输出结果数组：[${counts.join(', ')}]`;
                renderString(inputStr, currentIdx);
                return;
            }

            const char = inputStr[currentIdx];
            renderString(inputStr, currentIdx);

            let foundFinger = -1;
            
            // 模拟 C++ 代码中的 for(int i=0; i<8; ++i) 查表过程
            for (let i = 0; i < 8; i++) {
                if (keysTable[i].includes(char)) {
                    foundFinger = i;
                    break;
                }
            }

            const logBox = document.getElementById('logBox');
            if (foundFinger !== -1) {
                // 找到了
                counts[foundFinger]++;
                
                // 更新UI
                const keyElem = document.getElementById('key-' + char);
                if (keyElem) keyElem.classList.add('active');
                
                const cntElem = document.getElementById(`cnt-${foundFinger}`);
                cntElem.classList.add('active');
                document.getElementById(`val-${foundFinger}`).innerText = counts[foundFinger];

                logBox.innerHTML = `当前字符: <strong style="font-size:18px;">${char}</strong><br>` +
                                   `代码执行: <span class="log-code">keys[${foundFinger}].find('${char}') != npos</span><br>` + 
                                   `=> 找到归属！手指 <strong style="color:#f1c40f;">${foundFinger}</strong> 计数 +1`;
            } else {
                logBox.innerHTML = `当前字符: <strong>${char}</strong><br><span style="color:#e74c3c;">在所有 keys[] 中未找到该字符，跳过。</span>`;
            }

            currentIdx++;
            timer = setTimeout(step, 800); // 800ms 一步
        }

        step();
    }

    // 页面加载完成初始化
    window.onload = () => {
        initKeyboard();
        renderString(document.getElementById('inputStr').value.toUpperCase(), -1);
    };

    // 监听输入框变化实时更新
    document.getElementById('inputStr').addEventListener('input', function(e) {
        if(!isPlaying) renderString(e.target.value.toUpperCase(), -1);
    });

</script>
</body>
</html>
