<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ 输入流缓冲区动画沙盘</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2, h3 { color: #2c3e50; margin-top: 0; }
        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; align-items: center;}
        input[type="text"] {
            padding: 8px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex-grow: 1;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        button.action-btn { background-color: #2ecc71; }
        button.action-btn:hover { background-color: #27ae60; }
        button.reset-btn { background-color: #e74c3c; }
        button.reset-btn:hover { background-color: #c0392b; }
        
        /* 缓冲区样式 */
        .buffer-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 50px;
            padding: 10px;
            background: #2c3e50;
            border-radius: 5px;
            align-items: center;
        }
        .char-box {
            width: 40px;
            height: 40px;
            background: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            font-family: monospace;
            color: #2c3e50;
            transition: all 0.3s ease;
        }
        .char-box.space { background: #bdc3c7; color: #7f8c8d; }
        .char-box.newline { background: #e67e22; color: white; }
        .char-box.highlight { transform: scale(1.1); background: #f1c40f; color: #333;}
        
        /* 变量展示区 */
        .vars-container { display: flex; gap: 20px; }
        .var-card {
            flex: 1;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .var-name { font-weight: bold; color: #e74c3c; margin-bottom: 10px; font-family: monospace;}
        .var-value {
            font-size: 18px;
            min-height: 25px;
            background: white;
            padding: 5px;
            border-radius: 4px;
            border: 1px dashed #ccc;
            word-break: break-all;
        }
        
        /* 日志区 */
        .log-box {
            background: #2b2b2b;
            color: #a9b7c6;
            font-family: monospace;
            padding: 15px;
            border-radius: 5px;
            height: 120px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .log-entry { margin-bottom: 5px; }
        .log-entry.highlight { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="card">
        <h2>C++ 输入流 (Input Buffer) 教学沙盘</h2>
        <p>演示 <code>cin >> s</code> 与 <code>getline(cin, s)</code> 的底层区别。注意观察空格和换行符（↵）的去留！</p>
        
        <div class="control-panel">
            <input type="text" id="userInput" value="Hello World " placeholder="输入模拟内容...">
            <button onclick="loadBuffer()">敲击回车录入缓冲区</button>
            <button class="reset-btn" onclick="resetAll()">重置全部</button>
        </div>

        <h3>当前输入流缓冲区 (Input Stream)</h3>
        <div class="buffer-container" id="bufferDisplay"></div>
    </div>

    <div class="card">
        <h3>代码执行控制区</h3>
        <div class="control-panel">
            <button class="action-btn" onclick="executeCin('s1')">执行: cin >> s1;</button>
            <button class="action-btn" onclick="executeCin('s2')">执行: cin >> s2;</button>
            <button class="action-btn" onclick="executeGetline('s3')">执行: getline(cin, s3);</button>
        </div>

        <div class="vars-container">
            <div class="var-card">
                <div class="var-name">string s1;</div>
                <div class="var-value" id="val_s1"></div>
            </div>
            <div class="var-card">
                <div class="var-name">string s2;</div>
                <div class="var-value" id="val_s2"></div>
            </div>
            <div class="var-card">
                <div class="var-name">string s3;</div>
                <div class="var-value" id="val_s3"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>执行日志 (终端输出)</h3>
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        let buffer = []; // 缓冲区数组
        let vars = { s1: "", s2: "", s3: "" };

        // 辅助：判断是否为空白字符
        function isWhitespace(c) {
            return c === ' ' || c === '\n' || c === '\t';
        }

        // 渲染缓冲区UI
        function renderBuffer() {
            const container = document.getElementById('bufferDisplay');
            container.innerHTML = '';
            if (buffer.length === 0) {
                container.innerHTML = '<span style="color: #7f8c8d;">(缓冲区为空)</span>';
                return;
            }
            buffer.forEach((char, index) => {
                const div = document.createElement('div');
                div.className = 'char-box';
                div.id = 'char-' + index;
                if (char === ' ') {
                    div.innerHTML = '␣';
                    div.classList.add('space');
                } else if (char === '\n') {
                    div.innerHTML = '↵';
                    div.classList.add('newline');
                } else {
                    div.innerText = char;
                }
                container.appendChild(div);
            });
        }

        // 渲染变量UI
        function renderVars() {
            document.getElementById('val_s1').innerText = vars.s1;
            document.getElementById('val_s2').innerText = vars.s2;
            document.getElementById('val_s3').innerText = vars.s3;
        }

        // 添加日志
        function log(msg, highlight = false) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (highlight ? ' highlight' : '');
            entry.innerText = "> " + msg;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 将用户输入加载到缓冲区 (模拟敲击键盘+回车)
        function loadBuffer() {
            const input = document.getElementById('userInput').value;
            // 追加到现有缓冲区，并强行加上代表回车的 \n
            for (let c of input) { buffer.push(c); }
            buffer.push('\n'); 
            renderBuffer();
            log(`用户输入了内容，末尾自动追加换行符 '\\n'，存入缓冲区。`, true);
        }

        // 重置
        function resetAll() {
            buffer = [];
            vars = { s1: "", s2: "", s3: "" };
            document.getElementById('logBox').innerHTML = '';
            renderBuffer();
            renderVars();
            log("环境已重置。");
        }

        // 模拟 cin >> s 的行为
        async function executeCin(varName) {
            if (buffer.length === 0) {
                log(`执行 cin >> ${varName}; 失败，缓冲区为空，程序阻塞等待输入...`, true);
                return;
            }

            let result = "";
            let i = 0;
            
            log(`开始执行 cin >> ${varName}; 正在跳过前导空白...`);
            // 1. 跳过前导空白符
            while (i < buffer.length && isWhitespace(buffer[i])) {
                i++;
            }
            // 移除被跳过的空白符
            buffer.splice(0, i);
            renderBuffer();
            
            if (buffer.length === 0) {
                log(`只有空白符，已被丢弃。继续等待有效输入...`);
                return;
            }

            // 2. 读取直到遇到下一个空白符
            i = 0;
            log(`开始读取有效字符...`);
            while (i < buffer.length && !isWhitespace(buffer[i])) {
                // 简单动画效果提示当前读取字符
                let charBox = document.getElementById('char-' + i);
                if(charBox) charBox.classList.add('highlight');
                
                result += buffer[i];
                i++;
            }

            // 3. 从缓冲区切除已读取的非空白字符，【注意：终止的空白符留在缓冲区！】
            buffer.splice(0, i);
            vars[varName] = result;
            
            renderBuffer();
            renderVars();
            
            let stopReason = buffer.length > 0 ? (buffer[0] === '\n' ? '换行符(\\n)' : '空格') : '流结束';
            log(`读取完成！读入 "${result}"。遇到 ${stopReason} 停止，且该符号被【保留】在缓冲区。`, true);
        }

        // 模拟 getline(cin, s) 的行为
        function executeGetline(varName) {
            if (buffer.length === 0) {
                log(`执行 getline(cin, ${varName}); 失败，缓冲区为空，阻塞...`, true);
                return;
            }

            let result = "";
            let i = 0;
            
            log(`开始执行 getline(cin, ${varName}); 读取直到遇到换行符...`);
            
            // 读取直到遇到 \n (不跳过前导空格)
            while (i < buffer.length && buffer[i] !== '\n') {
                result += buffer[i];
                i++;
            }

            // 从缓冲区切除已读取的字符
            buffer.splice(0, i);
            
            // 关键点：如果当前遇到了 \n，将其从缓冲区“吃掉”丢弃，但不加入字符串
            let encounteredNewline = false;
            if (buffer.length > 0 && buffer[0] === '\n') {
                buffer.splice(0, 1);
                encounteredNewline = true;
            }

            vars[varName] = result;
            
            renderBuffer();
            renderVars();
            
            if (encounteredNewline) {
                log(`读取完成！读入 "${result}"。遇到了换行符(\\n)，将其从缓冲区【丢弃】。`, true);
            } else {
                log(`读取完成！读入 "${result}"。缓冲区已空，未遇到换行符。`, true);
            }
        }

        // 初始化
        window.onload = () => {
            loadBuffer();
        };
    </script>
</body>
</html>
