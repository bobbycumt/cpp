<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS485 差分信号抗干扰交互演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: transparent; 
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        /* 核心容器：宽度限制为 790px */
        .widget-container {
            width: 790px;
            background: #0f172a;
            color: #f8fafc;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #334155;
            padding: 24px;
        }
        /* 电平柱状图容器 */
        .bar-container {
            position: relative;
            height: 220px;
            width: 55px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px dashed #475569;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        /* 零电位基准线 */
        .zero-line {
            position: absolute;
            bottom: 50%;
            left: -8px;
            right: -8px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 0;
        }
        .zero-label {
            position: absolute;
            bottom: calc(50% - 10px);
            left: -32px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
        }
        /* 动态电压柱 */
        .voltage-bar {
            width: 36px;
            border-radius: 4px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        /* 自定义滑块 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%;
            background: #f59e0b; cursor: pointer; margin-top: -9px;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 5px; background: #334155; border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="widget-container">
    
    <div class="mb-5 border-b border-slate-700 pb-3">
        <h2 class="text-xl font-bold text-sky-400 flex items-center gap-2">
            <i class="fas fa-balance-scale"></i> RS485 差分信号与共模干扰演示
        </h2>
        <p class="text-xs text-slate-400 mt-1">
            模拟环境噪声如何同时作用于 A、B 线，并观察接收端如何通过“减法”消除干扰。
        </p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
        <div>
            <label class="block text-xs font-medium text-slate-500 mb-2 uppercase">1. 发送逻辑控制 (TX)</label>
            <div class="flex gap-2">
                <button id="btnLogic1" class="flex-1 bg-sky-600 hover:bg-sky-500 text-white text-sm font-bold py-2 rounded transition border-2 border-sky-400 shadow-[0_0_10px_rgba(2,132,199,0.3)]">
                    逻辑 "1"
                </button>
                <button id="btnLogic0" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-400 text-sm font-bold py-2 rounded transition border-2 border-transparent">
                    逻辑 "0"
                </button>
            </div>
        </div>

        <div>
            <label class="block text-xs font-medium text-slate-500 mb-2 flex justify-between uppercase">
                <span>2. 施加干扰 (环境噪声)</span>
                <span id="noiseValue" class="text-amber-400 font-mono font-bold">0 V</span>
            </label>
            <input type="range" id="noiseSlider" min="-5" max="5" step="0.1" value="0">
            <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                <span>-5V (干扰)</span>
                <span>0V (理想)</span>
                <span>+5V (干扰)</span>
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between bg-slate-900/80 rounded-xl p-5 border border-slate-700 mb-6">
        
        <div class="flex flex-col items-center">
            <div class="text-xs font-bold text-sky-400 mb-3">导线 A (对地)</div>
            <div class="bar-container">
                <div class="zero-label">0V</div>
                <div class="zero-line"></div>
                <div id="barA" class="voltage-bar bg-sky-500">3V</div>
            </div>
            <div class="mt-3 font-mono text-xs text-slate-400" id="textA">Va = 3.0V</div>
        </div>

        <div class="text-2xl text-slate-600 mb-8 font-bold">－</div>

        <div class="flex flex-col items-center">
            <div class="text-xs font-bold text-emerald-400 mb-3">导线 B (对地)</div>
            <div class="bar-container">
                <div class="zero-label">0V</div>
                <div class="zero-line"></div>
                <div id="barB" class="voltage-bar bg-emerald-500">1V</div>
            </div>
            <div class="mt-3 font-mono text-xs text-slate-400" id="textB">Vb = 1.0V</div>
        </div>

        <div class="text-2xl text-slate-600 mb-8 font-bold">＝</div>

        <div class="flex flex-col items-center">
            <div class="text-xs font-bold text-purple-400 mb-3">接收端 (压差)</div>
            <div class="bar-container border-purple-500/20">
                <div class="zero-label">0V</div>
                <div class="zero-line"></div>
                <div id="barDiff" class="voltage-bar bg-purple-500">2V</div>
            </div>
            <div class="mt-3 font-mono text-xs font-bold text-purple-300" id="textDiff">A - B = 2.0V</div>
        </div>

    </div>

    <div class="text-center bg-slate-800/30 border border-slate-700 rounded-lg py-4">
        <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">单片机解析结果</div>
        <div id="logicResult" class="text-4xl font-bold text-sky-400 font-mono drop-shadow-[0_0_8px_rgba(56,189,248,0.5)]">
            1
        </div>
        <div id="logicExplanation" class="text-[11px] text-slate-500 mt-1">
            (压差 > +200mV，判定为 1)
        </div>
    </div>

</div>

<script>
    let baseVa = 3.0, baseVb = 1.0;
    const noiseSlider = document.getElementById('noiseSlider');
    const noiseValueText = document.getElementById('noiseValue');
    const barA = document.getElementById('barA'), barB = document.getElementById('barB'), barDiff = document.getElementById('barDiff');
    const textA = document.getElementById('textA'), textB = document.getElementById('textB'), textDiff = document.getElementById('textDiff');
    const logicResult = document.getElementById('logicResult'), logicExplanation = document.getElementById('logicExplanation');

    function update() {
        let noise = parseFloat(noiseSlider.value);
        noiseValueText.textContent = (noise > 0 ? "+" : "") + noise.toFixed(1) + " V";
        
        let actualVa = baseVa + noise, actualVb = baseVb + noise;
        let diffV = actualVa - actualVb;

        const pVal = 11; // 像素系数 (220px/20V)

        function setBar(bar, val) {
            let h = Math.min(Math.abs(val) * pVal, 110);
            bar.style.height = h + 'px';
            bar.textContent = (val > 0 ? '+' : '') + val.toFixed(1) + 'V';
            if (val >= 0) { bar.style.bottom = '50%'; bar.style.top = 'auto'; bar.classList.remove('bg-rose-500'); }
            else { bar.style.top = '50%'; bar.style.bottom = 'auto'; bar.classList.add('bg-rose-500'); }
        }

        setBar(barA, actualVa); setBar(barB, actualVb); setBar(barDiff, diffV);
        textA.textContent = `Va = ${actualVa.toFixed(1)}V`;
        textB.textContent = `Vb = ${actualVb.toFixed(1)}V`;
        textDiff.textContent = `A - B = ${diffV.toFixed(1)}V`;

        if (diffV > 0.2) {
            logicResult.textContent = "1"; logicResult.className = "text-4xl font-bold text-sky-400 font-mono";
            logicExplanation.textContent = "(压差 > +200mV，判定为逻辑 1)";
        } else if (diffV < -0.2) {
            logicResult.textContent = "0"; logicResult.className = "text-4xl font-bold text-emerald-400 font-mono";
            logicExplanation.textContent = "(压差 < -200mV，判定为逻辑 0)";
        }
    }

    document.getElementById('btnLogic1').onclick = () => { 
        baseVa = 3.0; baseVb = 1.0; 
        document.getElementById('btnLogic1').className = "flex-1 bg-sky-600 text-white text-sm font-bold py-2 rounded border-2 border-sky-400";
        document.getElementById('btnLogic0').className = "flex-1 bg-slate-700 text-slate-400 text-sm font-bold py-2 rounded border-2 border-transparent";
        update(); 
    };
    document.getElementById('btnLogic0').onclick = () => { 
        baseVa = 1.0; baseVb = 3.0; 
        document.getElementById('btnLogic0').className = "flex-1 bg-emerald-600 text-white text-sm font-bold py-2 rounded border-2 border-emerald-400";
        document.getElementById('btnLogic1').className = "flex-1 bg-slate-700 text-slate-400 text-sm font-bold py-2 rounded border-2 border-transparent";
        update(); 
    };
    noiseSlider.oninput = update;
    update();
</script>

</body>
</html>
